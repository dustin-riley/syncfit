name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npx tsc --noEmit

      - run: npm test

      # Persist Next.js's incremental build cache across runs. Recommended
      # by https://nextjs.org/docs/messages/no-cache. The cache key includes
      # the source-file hash so a code change still triggers a fresh build
      # of the affected modules.
      - uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.[jt]s', 'src/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      # Dummy env vars: the neon driver and Better Auth don't connect at
      # module load, so syntactically-valid placeholders are enough for
      # `next build` to bundle. Tests stay offline (LLM is mocked, no DB).
      - run: npm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost/ci?sslmode=require
          BETTER_AUTH_SECRET: ci-dummy-secret-not-used-at-build-time
          BETTER_AUTH_URL: http://localhost:3000
          ANTHROPIC_API_KEY: ci-dummy-key-not-used-at-build-time
