name: SyncFit
options:
  bundleIdPrefix: com.dustinriley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
# Files that should appear in Xcode's navigator but are not built into
# any target — XcodeGen config, signing template, helper scripts.
fileGroups:
  - project.yml
  - Signing.xcconfig.example
  - tools
# Project-level base settings. DEVELOPMENT_TEAM is sourced from
# Signing.xcconfig (gitignored, per-developer) — see Signing.xcconfig.example.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"
targets:
  SyncFit:
    type: application
    platform: iOS
    sources:
      - path: SyncFit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinriley.syncfit
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # Per-config Info.plist: Debug carries an ATS exception for
      # http://localhost (simulator → `npm run dev`); Release ships without it
      # so TestFlight / App Store binaries are HTTPS-only.
      configs:
        Debug:
          INFOPLIST_FILE: SyncFit/Info-Debug.plist
        Release:
          INFOPLIST_FILE: SyncFit/Info-Release.plist
    entitlements:
      path: SyncFit/SyncFit.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
  SyncFitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SyncFitTests
    dependencies:
      - target: SyncFit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinriley.syncfit.tests
        INFOPLIST_FILE: SyncFitTests/Info.plist

schemes:
  SyncFit:
    build:
      targets:
        SyncFit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SyncFitTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
