name: SyncFit
options:
  bundleIdPrefix: com.dustinriley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  SyncFit:
    type: application
    platform: iOS
    sources:
      - path: SyncFit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinriley.syncfit
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SyncFit/Info.plist
    entitlements:
      path: SyncFit/SyncFit.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
  SyncFitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SyncFitTests
    dependencies:
      - target: SyncFit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinriley.syncfit.tests

schemes:
  SyncFit:
    build:
      targets:
        SyncFit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SyncFitTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
